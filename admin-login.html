<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Admin Login | EduShare
    </title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center px-4 overflow-hidden">


    <!-- BACKGROUND -->
    <div
        class="fixed inset-0 -z-10 overflow-hidden">

        <div
            class="absolute top-0 right-0 w-[500px] h-[500px] bg-cyan-500/5 blur-[120px] rounded-full">
        </div>

        <div
            class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-purple-500/5 blur-[120px] rounded-full">
        </div>

    </div>



    <!-- LOGIN CARD -->
    <div
        class="w-full max-w-md bg-white/[0.03] border border-white/10 rounded-3xl p-8 backdrop-blur-xl">

        <!-- LOGO -->
        <div class="text-center mb-8">

            <div
                class="w-16 h-16 rounded-2xl bg-cyan-500 text-black flex items-center justify-center text-3xl font-bold mx-auto mb-4">

                E

            </div>

            <h1
                class="text-4xl font-bold text-white mb-2">

                Admin Login

            </h1>

            <p class="text-slate-400">

                Secure access to moderation panel

            </p>

        </div>



        <!-- FORM -->
        <form id="admin-login-form"
            class="space-y-5">

            <!-- USERNAME -->
            <div>

                <label
                    class="block text-sm font-medium text-slate-400 mb-2">

                    Admin Username

                </label>

                <input
                    id="admin-username"
                    type="text"
                    placeholder="Enter username"
                    class="w-full bg-slate-900 border border-white/10 rounded-2xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500">

            </div>



            <!-- PASSWORD -->
            <div>

                <label
                    class="block text-sm font-medium text-slate-400 mb-2">

                    Password

                </label>

                <input
                    id="admin-password"
                    type="password"
                    placeholder="Enter password"
                    class="w-full bg-slate-900 border border-white/10 rounded-2xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500">

            </div>



            <!-- LOGIN BUTTON -->
            <button
                type="submit"
                class="w-full bg-cyan-500 hover:bg-cyan-400 text-black py-3 rounded-2xl font-semibold transition-all duration-300">

                Login to Dashboard

            </button>

        </form>



        <!-- ERROR -->
        <p id="login-error"
            class="hidden text-red-400 text-sm mt-5 text-center">

            Invalid admin credentials.

        </p>

    </div>



    <!-- SCRIPT -->
    <script>

        const loginForm =
            document.getElementById(
                "admin-login-form"
            );

        const errorText =
            document.getElementById(
                "login-error"
            );



        // ADMIN CREDENTIALS
        const ADMIN_USERNAME =
            "admin";

        const ADMIN_PASSWORD =
            "edushare123";



        loginForm.addEventListener(

            "submit",

            (e) => {

                e.preventDefault();



                const username =
                    document.getElementById(
                        "admin-username"
                    ).value;

                const password =
                    document.getElementById(
                        "admin-password"
                    ).value;



                // CHECK LOGIN
                if (
                    username === ADMIN_USERNAME &&
                    password === ADMIN_PASSWORD
                ) {

                    // SAVE LOGIN SESSION
                    localStorage.setItem(
                        "adminLoggedIn",
                        "true"
                    );



                    // REDIRECT
                    window.location.href =
                        "admin.html";

                }

                else {

                    errorText.classList.remove(
                        "hidden"
                    );

                }

            }

        );

    </script>

</body>

</html>
