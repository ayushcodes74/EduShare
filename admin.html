<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Admin Panel | EduShare
    </title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-950 text-white min-h-screen overflow-x-hidden">
    <script>

        // CHECK ADMIN LOGIN
        const isAdminLoggedIn =
            localStorage.getItem(
                "adminLoggedIn"
            );



        // REDIRECT IF NOT LOGGED IN
        if (isAdminLoggedIn !== "true") {

            window.location.href =
                "admin-login.html";

        }

    </script>


    <!-- BACKGROUND GLOW -->
    <div class="fixed inset-0 -z-10 overflow-hidden">

        <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-cyan-500/5 blur-[120px] rounded-full">
        </div>

        <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-purple-500/5 blur-[120px] rounded-full">
        </div>

    </div>



    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-xl border-b border-white/10">

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">

            <!-- LOGO -->
            <div class="flex items-center gap-3">

                <div
                    class="w-10 h-10 rounded-xl bg-cyan-500 flex items-center justify-center text-black font-bold text-xl">

                    E

                </div>

                <div>

                    <h1 class="text-xl font-bold">
                        EduShare
                    </h1>

                    <p class="text-xs text-slate-500">
                        Admin Dashboard
                    </p>

                </div>

            </div>



            <!-- NAV -->
            <div class="flex items-center gap-4">


                <a href="index.html" class="text-slate-400 hover:text-cyan-400 transition">

                    Home

                </a>

                <a href="upload.html" class="text-slate-400 hover:text-cyan-400 transition">

                    Upload

                </a>
                <button onclick="logoutAdmin()"
                    class="bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white px-5 py-2 rounded-xl transition-all duration-300">

                    Logout

                </button>

            </div>

        </div>

    </header>



    <!-- MAIN -->
    <main class="px-4 sm:px-6 lg:px-8 py-10">

        <div class="max-w-7xl mx-auto">

            <!-- HEADING -->
            <div class="mb-10">

                <div
                    class="inline-flex items-center gap-2 bg-cyan-500/10 border border-cyan-500/20 px-4 py-2 rounded-full text-cyan-400 text-sm font-medium mb-5">

                    🛡 Moderation Panel

                </div>

                <h2 class="text-4xl sm:text-5xl font-bold text-white mb-4">

                    Pending Resource Verification

                </h2>

                <p class="text-slate-400 text-lg">

                    Approve or reject uploaded academic resources.

                </p>

            </div>



            <!-- STATS -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-12">

                <!-- PENDING -->
                <div class="bg-white/[0.03] border border-white/10 rounded-3xl p-6">

                    <p class="text-slate-400 text-sm mb-2">

                        Pending Resources

                    </p>

                    <h3 id="pending-count" class="text-4xl font-bold text-cyan-400">

                        0

                    </h3>

                </div>



                <!-- APPROVED -->
                <div class="bg-white/[0.03] border border-white/10 rounded-3xl p-6">

                    <p class="text-slate-400 text-sm mb-2">

                        Approved Today

                    </p>

                    <h3 class="text-4xl font-bold text-green-400">

                        0

                    </h3>

                </div>



                <!-- REJECTED -->
                <div class="bg-white/[0.03] border border-white/10 rounded-3xl p-6">

                    <p class="text-slate-400 text-sm mb-2">

                        Rejected Today

                    </p>

                    <h3 class="text-4xl font-bold text-red-400">

                        0

                    </h3>

                </div>

            </div>



            <!-- PENDING RESOURCES -->
            <div id="pending-container" class="grid md:grid-cols-2 xl:grid-cols-3 gap-8">

            </div>
            <!-- APPROVED RESOURCES -->

            <div class="mt-16">

                <h2 class="text-3xl font-bold text-white mb-8">

                    Approved Resources

                </h2>

                <div id="approved-container" class="grid md:grid-cols-2 xl:grid-cols-3 gap-8">

                </div>

            </div>

        </div>

    </main>



    <!-- SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



    <script>

        // SUPABASE CONFIG
        const supabaseUrl =
            "https://acdjioftdlsugfycsbvj.supabase.co";

        const supabaseKey =
            "sb_publishable_DtfvA3EJm991gqezfeYNng_jlSS0I9h";

        const supabaseClient =
            supabase.createClient(
                supabaseUrl,
                supabaseKey
            );



        // CONTAINER
        const pendingContainer =
            document.getElementById("pending-container");
        const approvedContainer =
            document.getElementById("approved-container");

        const pendingCount =
            document.getElementById("pending-count");



        // FETCH PENDING RESOURCES
        async function fetchPendingResources() {

            const {

                data,
                error

            } = await supabaseClient

                .from("resources")

                .select("*")

                .eq("status", "pending")

                .order("created_at", {

                    ascending: false

                });



            if (error) {

                console.error(error);

                return;

            }



            // UPDATE COUNT
            pendingCount.innerText =
                data.length;



            // EMPTY STATE
            if (data.length === 0) {

                pendingContainer.innerHTML = `

                <div class="col-span-full bg-white/[0.03] border border-white/10 rounded-3xl p-10 text-center">

                    <h3 class="text-3xl font-bold text-white mb-4">

                        No Pending Resources

                    </h3>

                    <p class="text-slate-400">

                        Everything is verified 🚀

                    </p>

                </div>

                `;

                return;

            }
           



            // GENERATE CARDS
            pendingContainer.innerHTML = "";
            data.forEach(resource => {

                pendingContainer.innerHTML += `

                <div class="bg-white/[0.03] border border-white/10 rounded-3xl p-6 hover:border-cyan-500/30 transition-all duration-300">

                    <!-- BADGE -->
                    <div class="flex items-center justify-between mb-5">

                        <span class="${resource.type === "notes"
                        ? "bg-cyan-500/10 text-cyan-400"
                        : "bg-purple-500/10 text-purple-400"
                    } px-4 py-1 rounded-full text-xs font-semibold">

                            ${resource.type.toUpperCase()}

                        </span>

                        <span
                            class="bg-yellow-500/10 text-yellow-400 px-3 py-1 rounded-full text-xs font-semibold">

                            PENDING

                        </span>

                    </div>



                    <!-- TITLE -->
                    <h3
                        class="text-2xl font-bold text-white mb-3">

                        ${resource.title}

                    </h3>



                    <!-- INFO -->
                    <div class="space-y-2 mb-6 text-sm">

                        <p class="text-slate-400">

                            <span class="text-slate-500">
                                Subject:
                            </span>

                            ${resource.subject}

                        </p>

                        <p class="text-slate-400">

                            <span class="text-slate-500">
                                College:
                            </span>

                            ${resource.college}

                        </p>

                        <p class="text-slate-400">

                            <span class="text-slate-500">
                                Branch:
                            </span>

                            ${resource.branch}

                        </p>

                        <p class="text-slate-400">

                            <span class="text-slate-500">
                                Semester:
                            </span>

                            ${resource.semester}

                        </p>

                    </div>



                    <!-- DESCRIPTION -->
                    <p
                        class="text-slate-400 text-sm leading-relaxed mb-6">

                        ${resource.description}

                    </p>



                    <!-- BUTTONS -->
                    <div class="flex gap-4">

                        <!-- PREVIEW -->
                        <a href="${resource.pdf_url}"
                            target="_blank"
                            class="flex-1 bg-slate-900 hover:bg-slate-800 border border-white/10 py-3 rounded-2xl text-center font-semibold text-slate-300 transition-all duration-300">

                            Preview

                        </a>



                        <!-- APPROVE -->
                        <button
                            onclick="approveResource(${resource.id})"
                            class="flex-1 bg-green-500 hover:bg-green-400 text-black py-3 rounded-2xl font-semibold transition-all duration-300">

                            Approve

                        </button>
                        <button
    onclick="editResource(${resource.id}, '${resource.subject}', '${resource.college}', '${resource.branch}', '${resource.semester}')"
    class="flex-1 bg-yellow-500 hover:bg-yellow-400 text-black py-3 rounded-2xl font-semibold transition-all duration-300">

    Edit

</button>

                    </div>

<button
    onclick="deleteResource(${resource.id})"
    class="w-full mt-4 bg-red-600 hover:bg-red-500 text-white py-3 rounded-2xl font-semibold transition-all duration-300">

    🗑 Delete Resource

</button>

                    <!-- REJECT -->
                    <button
                        onclick="rejectResource(${resource.id})"
                        class="w-full mt-4 bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white py-3 rounded-2xl font-semibold transition-all duration-300">

                        Reject Resource

                    </button>

                </div>

                `;

            });

        }
        async function fetchApprovedResources() {

    const {

        data,
        error

    } = await supabaseClient

        .from("resources")

        .select("*")

        .eq("status", "approved")

        .order("created_at", {

            ascending: false

        });

    if (error) {

        console.error(error);

        return;

    }

    approvedContainer.innerHTML = "";
    if (data.length === 0) {

    approvedContainer.innerHTML = `
        <div class="col-span-full text-center p-8">
            <p class="text-slate-500">
                No approved resources yet.
            </p>
        </div>
    `;

    return;
}

    data.forEach(resource => {

        approvedContainer.innerHTML += `

        <div class="bg-white/[0.03]
                    border border-green-500/20
                    rounded-3xl p-6">

            <div class="flex justify-between mb-4">

                <span
                    class="bg-green-500/10
                           text-green-400
                           px-3 py-1
                           rounded-full
                           text-xs">

                    APPROVED

                </span>

            </div>

            <h3 class="text-xl font-bold mb-3">

                ${resource.title}

            </h3>

            <p class="text-slate-400 mb-2">

                ${resource.subject}

            </p>

            <p class="text-slate-500 text-sm mb-5">

                ${resource.college}
            </p>

            <div class="flex gap-3">

                <button
                    onclick="editResource(
                        ${resource.id},
                        '${resource.subject}',
                        '${resource.college}',
                        '${resource.branch}',
                        '${resource.semester}'
                    )"

                    class="flex-1
                           bg-yellow-500
                           hover:bg-yellow-400
                           text-black
                           py-2 rounded-xl">

                    Edit

                </button>

                <button
                    onclick="deleteResource(
                        ${resource.id}
                    )"

                    class="flex-1
                           bg-red-500
                           hover:bg-red-400
                           text-white
                           py-2 rounded-xl">

                    Delete

                </button>

            </div>

        </div>

        `;

    });

}



        // APPROVE RESOURCE
        async function approveResource(id) {

            const {

                error

            } = await supabaseClient

                .from("resources")

                .update({

                    status: "approved"

                })

                .eq("id", id);



            if (error) {

                console.error(error);

                alert("Approval failed.");

                return;

            }



            alert("Resource Approved ✅");



            // REFRESH
            pendingContainer.innerHTML = "";

            fetchPendingResources();
            fetchApprovedResources();

        }
        async function editResource(
            id,
            oldSubject,
            oldCollege,
            oldBranch,
            oldSemester
        ) {

            const subject =
                prompt(
                    "Subject",
                    oldSubject
                );

            if (!subject)
                return;

            const college =
                prompt(
                    "College",
                    oldCollege
                );

            if (!college)
                return;

            const branch =
                prompt(
                    "Branch",
                    oldBranch
                );

            if (!branch)
                return;

            const semester =
                prompt(
                    "Semester",
                    oldSemester
                );

            if (!semester)
                return;

            const { error } =
                await supabaseClient

                    .from("resources")

                    .update({

                        subject,
                        college,
                        branch,
                        semester

                    })

                    .eq("id", id);

            if (error) {

                console.error(error);

                alert("Update failed");

                return;

            }

            alert("Resource Updated ✏");

            pendingContainer.innerHTML = "";

            fetchPendingResources();
            fetchApprovedResources();

        }



        // REJECT RESOURCE
        async function rejectResource(id) {

            const confirmDelete =
                confirm(
                    "Reject this resource?"
                );



            if (!confirmDelete)
                return;



            const {

                error

            } = await supabaseClient

                .from("resources")

                .delete()

                .eq("id", id);



            if (error) {

                console.error(error);

                alert("Rejection failed.");

                return;

            }



            alert("Resource Rejected ❌");



            // REFRESH
            pendingContainer.innerHTML = "";

            fetchPendingResources();

        }
        // DELETE RESOURCE
        async function deleteResource(id) {

            const confirmDelete =
                confirm(
                    "Are you sure you want to permanently delete this resource?"
                );

            if (!confirmDelete)
                return;

            const { error } =
                await supabaseClient
                    .from("resources")
                    .delete()
                    .eq("id", id);

            if (error) {

                console.error(error);

                alert("Delete failed.");

                return;

            }

            alert("Resource Deleted 🗑");

            pendingContainer.innerHTML = "";

            fetchPendingResources();
            fetchApprovedResources();

        }



        // INITIAL FETCH
        fetchPendingResources();
        fetchApprovedResources();

        // LOGOUT
        function logoutAdmin() {

            localStorage.removeItem(
                "adminLoggedIn"
            );

            window.location.href =
                "admin-login.html";

        }

    </script>

</body>

</html>
